name: Deploy Win32 Apps to Intune

on:
  workflow_dispatch:
    inputs:
      apps:
        description: "Comma-separated app folder names (blank = all from appList.json)"
        required: false
        default: ""

jobs:
  # ── Plan: read appList.json → build a matrix entry per app ──
  plan:
    name: Build matrix
    runs-on: windows-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Build matrix from appList.json
        id: matrix
        shell: pwsh
        env:
          APPS_FILTER: ${{ github.event.inputs.apps }}
        run: |
          $appList = Get-Content -Raw 'appList.json' | ConvertFrom-Json
          $filter  = ($env:APPS_FILTER ?? '').Trim()

          if ($filter) {
            $names   = $filter -split ',' | ForEach-Object { $_.Trim() }
            $appList = $appList | Where-Object { $_.AppFolderName -in $names }
          }
          if (-not $appList -or @($appList).Count -eq 0) {
            throw 'No apps matched. Check appList.json or the apps input.'
          }

          $matrix = @{ include = @() }
          foreach ($app in @($appList)) {
            $folder  = "Apps/$($app.AppFolderName)"
            $appJson = Join-Path $folder 'App.json'
            if (-not (Test-Path $appJson)) { throw "Missing $appJson for $($app.IntuneAppName)" }

            $filters = $app.FilterOptions | Select-Object -First 1
            $matrix.include += @{
              appName     = $app.IntuneAppName
              appFolder   = $folder
              appSource   = $app.AppSource ?? 'Evergreen'
              appId       = $app.AppID
              iconUrl     = $app.IconUrl ?? ''
              filterArch  = $filters.Architecture
              filterType  = $filters.Type
              filterChan  = $filters.Channel
              filterLang  = $filters.Language
              filterStrm  = $filters.Stream
              filterScope = $filters.Scope
            }
          }

          $json = $matrix | ConvertTo-Json -Depth 5 -Compress
          "result=$json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Matrix: $json"

  # ── Deploy: download → package → publish (one job per app) ──
  deploy:
    name: ${{ matrix.appName }}
    needs: plan
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        shell: pwsh
        run: |
          @('TENANT_ID','CLIENT_ID','CLIENT_SECRET') | ForEach-Object {
            if (-not [Environment]::GetEnvironmentVariable($_)) {
              throw "Missing secret: $_. Configure it in repo Settings > Secrets."
            }
          }

      - name: Install Evergreen module
        if: matrix.appSource == 'Evergreen'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Evergreen -Force -Scope CurrentUser
          $retries = 3
          for ($i = 1; $i -le $retries; $i++) {
            try { Update-Evergreen; break }
            catch {
              Write-Warning "Update-Evergreen attempt $i/$retries failed: $_"
              if ($i -eq $retries) { throw }
              Start-Sleep -Seconds (10 * $i)
            }
          }

      - name: Download installer via Evergreen
        if: matrix.appSource == 'Evergreen'
        shell: pwsh
        run: |
          Import-Module Evergreen
          $apps = Get-EvergreenApp -Name '${{ matrix.appId }}'

          $arch = '${{ matrix.filterArch }}'
          $type = '${{ matrix.filterType }}'
          $chan = '${{ matrix.filterChan }}'
          $lang = '${{ matrix.filterLang }}'
          $strm = '${{ matrix.filterStrm }}'
          if ($arch) { $apps = $apps | Where-Object { $_.Architecture -eq $arch } }
          if ($type) { $apps = $apps | Where-Object { $_.Type -eq $type } }
          if ($chan) { $apps = $apps | Where-Object { $_.Channel -eq $chan } }
          if ($lang) { $apps = $apps | Where-Object { $_.Language -eq $lang } }
          if ($strm) { $apps = $apps | Where-Object { $_.Stream -eq $strm } }
          $app = $apps | Sort-Object { try { [version]($_.Version -replace '[^0-9.]','') } catch { [version]'0.0' } } -Descending |
            Select-Object -First 1

          if (-not $app) { throw "No Evergreen result for ${{ matrix.appId }} (arch=$arch, type=$type)" }
          Write-Host "Found: $($app.Version) -> $($app.URI)"

          $filesDir = Join-Path '${{ matrix.appFolder }}' 'Files'
          New-Item -ItemType Directory -Force -Path $filesDir | Out-Null
          $fileName = Split-Path $app.URI -Leaf
          $outPath  = Join-Path $filesDir $fileName
          Invoke-WebRequest -Uri $app.URI -OutFile $outPath -UseBasicParsing
          Write-Host "Downloaded: $outPath ($('{0:N1} MB' -f ((Get-Item $outPath).Length / 1MB)))"

          "APP_VERSION=$($app.Version)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Download installer via Winget
        if: matrix.appSource == 'Winget'
        shell: pwsh
        run: |
          $appId = '${{ matrix.appId }}'
          $arch  = '${{ matrix.filterArch }}'
          $type  = '${{ matrix.filterType }}'
          $scope = '${{ matrix.filterScope }}'

          $filesDir = Join-Path '${{ matrix.appFolder }}' 'Files'
          New-Item -ItemType Directory -Force -Path $filesDir | Out-Null

          # Build winget download arguments
          $wingetArgs = @('download', '--id', $appId,
                          '--download-directory', (Resolve-Path $filesDir).Path,
                          '--accept-source-agreements', '--accept-package-agreements')
          if ($arch)  { $wingetArgs += '--architecture';   $wingetArgs += $arch }
          if ($type)  { $wingetArgs += '--installer-type'; $wingetArgs += $type }
          if ($scope) { $wingetArgs += '--scope';          $wingetArgs += $scope }

          # Download with retry logic
          $retries = 3
          for ($i = 1; $i -le $retries; $i++) {
            try {
              Write-Host "Winget download attempt $i/$retries for $appId"
              $output = & winget @wingetArgs 2>&1 | Out-String
              Write-Host $output
              if ($LASTEXITCODE -ne 0) { throw "winget exited with code $LASTEXITCODE" }
              break
            } catch {
              Write-Warning "Attempt $i/$retries failed: $_"
              if ($i -eq $retries) { throw "Winget download failed after $retries attempts for $appId" }
              Start-Sleep -Seconds (10 * $i)
            }
          }

          $downloaded = Get-ChildItem $filesDir -File | Sort-Object Length -Descending | Select-Object -First 1
          if (-not $downloaded) { throw "No installer file found after winget download for $appId" }
          Write-Host "Downloaded: $($downloaded.FullName) ($('{0:N1} MB' -f ($downloaded.Length / 1MB)))"

          # Extract version from winget show
          $showOutput = & winget show --id $appId --accept-source-agreements 2>&1 | Out-String
          $version = ($showOutput -split "`n" |
            Where-Object { $_ -match '^\s*Version\s*:\s*(.+)' } |
            ForEach-Object { $Matches[1].Trim() } |
            Select-Object -First 1) ?? 'Unknown'
          Write-Host "Version: $version"
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Download app icon
        shell: pwsh
        run: |
          $iconUrl  = '${{ matrix.iconUrl }}'
          $iconPath = Join-Path '${{ matrix.appFolder }}' 'Icon.png'

          if (Test-Path $iconPath) {
            $size = (Get-Item $iconPath).Length
            if ($size -gt 200) {
              Write-Host "Using existing Icon.png ($size bytes)"
              return
            }
            Write-Host "Existing Icon.png is a placeholder ($size bytes) — replacing from CDN"
          }

          if (-not $iconUrl) {
            Write-Host "No IconUrl configured — skipping icon download"
            return
          }

          try {
            Invoke-WebRequest -Uri $iconUrl -OutFile $iconPath -UseBasicParsing
            Write-Host "Downloaded icon: $iconPath ($('{0:N1} KB' -f ((Get-Item $iconPath).Length / 1KB)))"
          } catch {
            Write-Warning "Failed to download icon from $iconUrl — $_"
          }

      - name: Prepare PSADT package folder
        shell: pwsh
        run: |
          $appFolder = '${{ matrix.appFolder }}'
          $frameworkSrc = 'Templates/Framework/Source'

          Copy-Item "$frameworkSrc/Deploy-Application.exe"        -Destination $appFolder -Force
          Copy-Item "$frameworkSrc/Deploy-Application.exe.config" -Destination $appFolder -Force
          Copy-Item "$frameworkSrc/AppDeployToolkit" -Destination $appFolder -Recurse -Force

          Write-Host "PSADT framework copied to $appFolder"

      - name: Package to .intunewin
        shell: pwsh
        run: |
          $prepDir = "$env:RUNNER_TEMP\prep"
          $outDir  = "$env:RUNNER_TEMP\out"
          New-Item -ItemType Directory -Force -Path $prepDir, $outDir | Out-Null

          $toolUrl = 'https://github.com/microsoft/Microsoft-Win32-Content-Prep-Tool/raw/refs/heads/master/IntuneWinAppUtil.exe'
          Invoke-WebRequest -Uri $toolUrl -OutFile "$prepDir\IntuneWinAppUtil.exe" -UseBasicParsing
          if (-not (Test-Path "$prepDir\IntuneWinAppUtil.exe")) { throw 'Failed to download IntuneWinAppUtil.exe' }

          $src = Resolve-Path '${{ matrix.appFolder }}'
          & "$prepDir\IntuneWinAppUtil.exe" -c $src -s 'Deploy-Application.exe' -o $outDir -q

          $intunewin = Get-ChildItem $outDir -Filter '*.intunewin' | Select-Object -First 1
          if (-not $intunewin) { throw 'Packaging failed: no .intunewin produced' }
          "INTUNEWIN_PATH=$($intunewin.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Packaged: $($intunewin.FullName) ($('{0:N1} MB' -f ($intunewin.Length / 1MB)))"

      - name: Publish to Intune
        shell: pwsh
        run: |
          & "${{ github.workspace }}/Scripts/Publish-Win32App.ps1" `
            -TenantId     $env:TENANT_ID `
            -ClientId     $env:CLIENT_ID `
            -ClientSecret $env:CLIENT_SECRET `
            -AppFolder    '${{ matrix.appFolder }}' `
            -IntuneWinPath $env:INTUNEWIN_PATH `
            -AppVersion   $env:APP_VERSION

      - name: Upload artifact
        if: always() && env.INTUNEWIN_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.appName }}.intunewin
          path: ${{ env.INTUNEWIN_PATH }}
          if-no-files-found: ignore
