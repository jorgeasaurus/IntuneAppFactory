name: Deploy Win32 Apps to Intune

on:
  workflow_dispatch:
    inputs:
      apps:
        description: "Comma-separated app folder names (blank = all from appList.json)"
        required: false
        default: ""

jobs:
  # ── Plan: read appList.json → build a matrix entry per app ──
  plan:
    name: Build matrix
    runs-on: windows-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Build matrix from appList.json
        id: matrix
        shell: pwsh
        run: |
          $appList = Get-Content -Raw 'appList.json' | ConvertFrom-Json
          $filter  = '${{ github.event.inputs.apps }}'.Trim()

          if ($filter) {
            $names   = $filter -split ',' | ForEach-Object { $_.Trim() }
            $appList = $appList | Where-Object { $_.AppFolderName -in $names }
          }
          if (-not $appList -or @($appList).Count -eq 0) {
            throw 'No apps matched. Check appList.json or the apps input.'
          }

          $matrix = @{ include = @() }
          foreach ($app in @($appList)) {
            $folder  = "Apps/$($app.AppFolderName)"
            $appJson = Join-Path $folder 'App.json'
            if (-not (Test-Path $appJson)) { throw "Missing $appJson for $($app.IntuneAppName)" }

            $matrix.include += @{
              appName     = $app.IntuneAppName
              appFolder   = $folder
              evergreenId = $app.AppID
              filterArch  = ($app.FilterOptions | Select-Object -First 1).Architecture
              filterType  = ($app.FilterOptions | Select-Object -First 1).Type
            }
          }

          $json = $matrix | ConvertTo-Json -Depth 5 -Compress
          "result=$json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Matrix: $json"

  # ── Deploy: download → package → publish (one job per app) ──
  deploy:
    name: ${{ matrix.appName }}
    needs: plan
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    env:
      TENANT_ID:     ${{ secrets.TENANT_ID }}
      CLIENT_ID:     ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        shell: pwsh
        run: |
          @('TENANT_ID','CLIENT_ID','CLIENT_SECRET') | ForEach-Object {
            if (-not [Environment]::GetEnvironmentVariable($_)) {
              throw "Missing secret: $_. Configure it in repo Settings > Secrets."
            }
          }

      - name: Install Evergreen module
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Evergreen -Force -Scope CurrentUser

      - name: Download installer via Evergreen
        shell: pwsh
        run: |
          Import-Module Evergreen
          $apps = Get-EvergreenApp -Name '${{ matrix.evergreenId }}'

          $arch = '${{ matrix.filterArch }}'
          $type = '${{ matrix.filterType }}'
          if ($arch) { $apps = $apps | Where-Object { $_.Architecture -eq $arch } }
          if ($type) { $apps = $apps | Where-Object { $_.Type -eq $type } }
          $app = $apps | Sort-Object { try { [version]($_.Version -replace '[^0-9.]','') } catch { [version]'0.0' } } -Descending |
            Select-Object -First 1

          if (-not $app) { throw "No Evergreen result for ${{ matrix.evergreenId }} (arch=$arch, type=$type)" }
          Write-Host "Found: $($app.Version) -> $($app.URI)"

          $filesDir = Join-Path '${{ matrix.appFolder }}' 'Files'
          New-Item -ItemType Directory -Force -Path $filesDir | Out-Null
          $fileName = Split-Path $app.URI -Leaf
          $outPath  = Join-Path $filesDir $fileName
          Invoke-WebRequest -Uri $app.URI -OutFile $outPath -UseBasicParsing
          Write-Host "Downloaded: $outPath ($('{0:N1} MB' -f ((Get-Item $outPath).Length / 1MB)))"

          "APP_VERSION=$($app.Version)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Prepare PSADT package folder
        shell: pwsh
        run: |
          $appFolder = '${{ matrix.appFolder }}'
          $frameworkSrc = 'Templates/Framework/Source'

          Copy-Item "$frameworkSrc/Deploy-Application.exe"        -Destination $appFolder -Force
          Copy-Item "$frameworkSrc/Deploy-Application.exe.config" -Destination $appFolder -Force
          Copy-Item "$frameworkSrc/AppDeployToolkit" -Destination $appFolder -Recurse -Force

          Write-Host "PSADT framework copied to $appFolder"

      - name: Package to .intunewin
        shell: pwsh
        run: |
          $prepDir = "$env:RUNNER_TEMP\prep"
          $outDir  = "$env:RUNNER_TEMP\out"
          New-Item -ItemType Directory -Force -Path $prepDir, $outDir | Out-Null

          $headers = @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
          $releases = Invoke-RestMethod 'https://api.github.com/repos/microsoft/Microsoft-Win32-Content-Prep-Tool/releases/latest' -Headers $headers
          $asset = $releases.assets | Where-Object { $_.name -match 'IntuneWinAppUtil\.exe' } | Select-Object -First 1
          if (-not $asset) { throw 'IntuneWinAppUtil.exe not found in latest release' }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$prepDir\IntuneWinAppUtil.exe" -Headers @{ Accept = 'application/octet-stream'; Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }

          $src = Resolve-Path '${{ matrix.appFolder }}'
          & "$prepDir\IntuneWinAppUtil.exe" -c $src -s 'Deploy-Application.exe' -o $outDir -q

          $intunewin = Get-ChildItem $outDir -Filter '*.intunewin' | Select-Object -First 1
          if (-not $intunewin) { throw 'Packaging failed: no .intunewin produced' }
          "INTUNEWIN_PATH=$($intunewin.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Packaged: $($intunewin.FullName) ($('{0:N1} MB' -f ($intunewin.Length / 1MB)))"

      - name: Publish to Intune
        shell: pwsh
        run: |
          & "${{ github.workspace }}/Scripts/Publish-Win32App.ps1" `
            -TenantId     $env:TENANT_ID `
            -ClientId     $env:CLIENT_ID `
            -ClientSecret $env:CLIENT_SECRET `
            -AppFolder    '${{ matrix.appFolder }}' `
            -IntuneWinPath $env:INTUNEWIN_PATH

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.appName }}.intunewin
          path: ${{ env.INTUNEWIN_PATH }}
          if-no-files-found: ignore
